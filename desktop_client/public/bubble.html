<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AstrBot VTuber Bubble</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: transparent;
        pointer-events: none;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      }

      #bubble {
        opacity: 0;
        transform: translateY(10px) scale(0.982);
        transition: opacity 140ms ease-out, transform 140ms cubic-bezier(0.22, 0.86, 0.28, 1);
        position: absolute;
        left: 0;
        top: 0;
        color: #ffffff;
        background: rgba(16, 22, 36, 0.82);
        border: 1px solid rgba(255, 255, 255, 0.28);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        border-radius: 16px;
        padding: 10px 14px;
        line-height: 1.45;
        font-size: 15px;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.24);
        overflow: hidden;
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        display: flex;
        align-items: stretch;
        -webkit-mask-image: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0) 0%,
          rgba(0, 0, 0, 1) 5%,
          rgba(0, 0, 0, 1) 100%
        );
        mask-image: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0) 0%,
          rgba(0, 0, 0, 1) 5%,
          rgba(0, 0, 0, 1) 100%
        );
      }

      #bubble-lines {
        margin-top: 0;
        height: 100%;
        width: 100%;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        gap: 4px;
        overflow: hidden;
      }

      #bubble.visible {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      #bubble.pop-in {
        animation: bubblePopIn 120ms cubic-bezier(0.2, 0.88, 0.2, 1);
      }

      .bubble-line {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1.45;
        flex: 0 0 auto;
        opacity: 1;
        transform: translateY(0);
        transition: opacity 110ms ease, transform 110ms ease;
      }

      .bubble-line.line-enter {
        opacity: 0;
        transform: translateY(6px);
      }

      .bubble-line.line-exit {
        opacity: 0;
        transform: translateY(-4px);
      }

      @keyframes bubblePopIn {
        0% {
          transform: translateY(10px) scale(0.972);
        }
        70% {
          transform: translateY(0) scale(1.006);
        }
        100% {
          transform: translateY(0) scale(1);
        }
      }
    </style>
  </head>
  <body>
    <div id="bubble">
      <div id="bubble-lines"></div>
    </div>
    <script src="./bubble.js"></script>
  </body>
</html>
